name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  notify:
    name: Images pushed — Watchtower will deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Done
        run: echo "Images pushed to GHCR. Watchtower will pull and deploy within 5 minutes."
