spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wordblitz}
    username: ${SPRING_DATASOURCE_USERNAME:wordblitz}
    password: ${SPRING_DATASOURCE_PASSWORD:devpassword}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-days: 7
  admin:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD}

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
