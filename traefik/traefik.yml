api:
  dashboard: true
  insecure: true  # Only accessible internally, not exposed publicly

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

certificatesResolvers:
  letsencrypt:
    acme:
      email: ${ACME_EMAIL:-admin@example.com}
      storage: /acme.json
      httpChallenge:
        entryPoint: web

providers:
  file:
    directory: /dynamic
    watch: true

log:
  level: INFO

accessLog: {}
