services:
  traefik:
    image: traefik:v3.0
    container_name: wordblitz-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/traefik.yml:ro
      - ./traefik/dynamic:/dynamic:ro
      - ./traefik/acme.json:/acme.json
    networks:
      - wordblitz-net

  frontend:
    build:
      context: ./frontend
    image: ghcr.io/${GITHUB_REPOSITORY:-mikkelgn/website}/frontend:${IMAGE_TAG:-latest}
    container_name: wordblitz-frontend
    restart: unless-stopped
    networks:
      - wordblitz-net
    labels:
      - "traefik.enable=true"
      # HTTP router — works by IP or any hostname, no SSL required
      - "traefik.http.routers.frontend-http.rule=PathPrefix(`/`) && !PathPrefix(`/api`)"
      - "traefik.http.routers.frontend-http.entrypoints=web"
      - "traefik.http.routers.frontend-http.priority=1"
      # HTTPS router — domain + Let's Encrypt cert
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN}`) && !PathPrefix(`/api`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  backend:
    build:
      context: ./backend
    image: ghcr.io/${GITHUB_REPOSITORY:-mikkelgn/website}/backend:${IMAGE_TAG:-latest}
    container_name: wordblitz-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/wordblitz
      SPRING_DATASOURCE_USERNAME: wordblitz
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wordblitz-net
    labels:
      - "traefik.enable=true"
      # HTTP router — works by IP or any hostname
      - "traefik.http.routers.backend-http.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.backend-http.entrypoints=web"
      - "traefik.http.routers.backend-http.priority=10"
      # HTTPS router — domain + Let's Encrypt cert
      - "traefik.http.routers.backend.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"

  db:
    image: postgres:16-alpine
    container_name: wordblitz-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: wordblitz
      POSTGRES_USER: wordblitz
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - wordblitz-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wordblitz"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db-data:

networks:
  wordblitz-net:
    driver: bridge
