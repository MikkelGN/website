services:
  traefik:
    image: traefik:v3.3
    container_name: wordblitz-traefik
    restart: unless-stopped
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/traefik.yml:ro
      - ./traefik/dynamic:/dynamic:ro
      - ./traefik/acme.json:/acme.json
    networks:
      - wordblitz-net

  frontend:
    build:
      context: ./frontend
    image: ghcr.io/${GITHUB_REPOSITORY:-mikkelgn/website}/frontend:${IMAGE_TAG:-latest}
    container_name: wordblitz-frontend
    restart: unless-stopped
    networks:
      - wordblitz-net

  backend:
    build:
      context: ./backend
    image: ghcr.io/${GITHUB_REPOSITORY:-mikkelgn/website}/backend:${IMAGE_TAG:-latest}
    container_name: wordblitz-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/wordblitz
      SPRING_DATASOURCE_USERNAME: wordblitz
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wordblitz-net

  db:
    image: postgres:16-alpine
    container_name: wordblitz-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: wordblitz
      POSTGRES_USER: wordblitz
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - wordblitz-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wordblitz"]
      interval: 5s
      timeout: 5s
      retries: 5

  watchtower:
    image: containrrr/watchtower
    container_name: wordblitz-watchtower
    restart: unless-stopped
    environment:
      WATCHTOWER_POLL_INTERVAL: 300
      WATCHTOWER_CLEANUP: "true"
      REPO_USER: ${WATCHTOWER_USER:-mikkelgn}
      REPO_PASS: ${WATCHTOWER_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: wordblitz-frontend wordblitz-backend

volumes:
  db-data:

networks:
  wordblitz-net:
    driver: bridge
